name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: write

    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache
      SCCACHE_GHA_ENABLED: "true"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up MSVC x86 environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x86

    - name: Set up sccache
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Set VCPKG_ROOT
      shell: bash
      run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

    - name: Generate version
      id: version
      shell: bash
      run: |
        VERSION="$(date -u +%Y%m%d)-$(git rev-parse --short HEAD)"
        MODULE_VERSION="$(date -u +%Y),$(date -u +%-m),$(date -u +%-d),0"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "module_version=$MODULE_VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Create vcpkg binary cache directory
      shell: bash
      run: mkdir -p "${{ github.workspace }}/vcpkg-cache"

    - name: Restore vcpkg binary cache
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg-cache
        key: vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-overlays/**') }}
        restore-keys: vcpkg-

    - name: Configure CMake
      shell: bash
      run: |
        cmake $GITHUB_WORKSPACE --preset=vcpkg-ci \
          -DGWTOOLBOXDLL_VERSION="${{ steps.version.outputs.version }}" \
          -DGWTOOLBOX_MODULE_VERSION="${{ steps.version.outputs.module_version }}" \
          -DCMAKE_C_COMPILER_LAUNCHER=sccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

    - name: Build
      shell: bash
      run: cmake --build build --target GWToolboxdll GWToolbox

    - name: Show sccache stats
      shell: bash
      run: sccache --show-stats

    - name: Save output
      uses: actions/upload-artifact@v4
      with:
        name: GWToolbox-${{ steps.version.outputs.version }}
        path: ${{ github.workspace }}/bin/

    - name: Create release
      if: github.ref == 'refs/heads/main'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        BIN_DIR="${{ github.workspace }}/bin"

        cp "$BIN_DIR/GWToolboxdll.dll" .
        cp "$BIN_DIR/GWToolbox.exe" .
        gzip -c "$BIN_DIR/GWToolboxdll.pdb" > GWToolboxdll.pdb.gz

        gh release create "$VERSION" \
          --title "$VERSION" \
          --notes "Build from $(git rev-parse --short HEAD)" \
          GWToolboxdll.dll GWToolbox.exe GWToolboxdll.pdb.gz
